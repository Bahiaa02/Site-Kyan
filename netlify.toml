[[headers]]
  for = "/videos/*"
  [headers.values]
    Content-Type = "video/mp4"
    Accept-Ranges = "bytes"
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/rider"
  to = "/rider.html"
  status = 200

[[redirects]]
  from = "/rider.html"
  to = "/rider.html"
  status = 200
  force = true
